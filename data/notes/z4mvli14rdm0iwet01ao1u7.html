<p>当在VScode中不小心将文件删除，可以通过命令行找回历史文件。</p>
<blockquote>
<p>提示 ：打开命令行 <code>Ctrl + Shft + P</code></p>
<p>输入命令 ：<code>Local History:Find Entry to Restore</code></p>
